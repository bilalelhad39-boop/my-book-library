<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- The page title will be set dynamically from YAML -->
  <title id="page-title">Loading...</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- YAML parser -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <style>
    /* ----- Modern Dark Theme (same as before) ----- */
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1c1c1c;
      --border: #2a2a2a;
      --accent: #c9a84c;
      --accent2: #e8c97a;
      --text: #e8e0d0;
      --muted: #7a7060;
      --modal-bg: rgba(0,0,0,0.88);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 70px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--accent);
      white-space: nowrap;
    }
    .logo span {
      font-style: italic;
      color: var(--text);
      opacity: 0.6;
      margin-left: 0.3em;
    }
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 42px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .count-badge {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Main */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .hero {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
    }
    .hero h1 em { color: var(--accent); font-style: italic; }
    .hero p { margin-top: 0.8rem; color: var(--muted); max-width: 500px; }

    /* Filters */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
      align-items: center;
    }
    .filter-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-right: 0.5rem;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0d0d; font-weight: 500; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,168,76,0.35);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .card-thumb {
      aspect-ratio: 3/4;
      background: var(--surface);
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .card:hover .card-thumb img { transform: scale(1.04); }
    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a, #222);
    }
    .placeholder-icon { font-size: 2.8rem; opacity: 0.25; }
    .placeholder-title { font-family: 'Playfair Display', serif; font-size: 0.75rem; color: var(--muted); padding: 0 1rem; text-align: center; }
    .category-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(13,13,13,0.85);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      border-radius: 4px;
      backdrop-filter: blur(6px);
    }
    .card-body {
      padding: 1rem 1.1rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }
    .card-author {
      font-size: 0.78rem;
      color: var(--accent);
      margin-bottom: 0.6rem;
      font-weight: 500;
    }
    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }
    .btn-download {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #0d0d0d;
    }
    .btn-download:hover { background: var(--accent2); }
    .btn-preview {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-preview:hover { border-color: var(--accent); color: var(--accent); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-bg);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(8px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 860px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .modal-meta { flex: 1; }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }
    .modal-author { font-size: 0.82rem; color: var(--accent); margin-top: 0.2rem; }
    .modal-close {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .modal-close:hover { color: var(--text); border-color: var(--accent); }
    .modal-preview {
      flex: 1;
      min-height: 500px;
    }
    .modal-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    .modal-footer .btn { flex: none; padding: 9px 20px; }

    /* Empty/loading states */
    .empty, .loading {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }
    .loading { font-style: italic; }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header-inner { gap: 1rem; }
      .logo span { display: none; }
      .count-badge { display: none; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .card-actions { flex-direction: column; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><span id="site-title"></span><span id="site-subtitle"></span></div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search by title or author…" autocomplete="off"/>
    </div>
    <div class="count-badge" id="count"></div>
  </div>
</header>

<main>
  <div class="hero">
    <h1 id="hero-line1"></h1>
    <p id="hero-desc"></p>
  </div>

  <div class="filters" id="filters">
    <span class="filter-label">Filter:</span>
  </div>

  <div class="grid" id="grid">
    <div class="loading">Loading library...</div>
  </div>
</main>

<footer class="site-footer" id="footer-text"></footer>

<!-- PDF Preview Modal -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-meta">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-author" id="modal-author"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-preview">
      <iframe id="modal-frame" title="Book preview"></iframe>
    </div>
    <div class="modal-footer">
      <a class="btn btn-download" id="modal-download" download>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </a>
      <button class="btn btn-preview" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- State -----
    let config = null;
    let books = [];
    let activeCategory = 'All';
    let searchTerm = '';

    const grid = document.getElementById('grid');
    const searchInput = document.getElementById('search');
    const filtersEl = document.getElementById('filters');
    const countEl = document.getElementById('count');

    // UI text elements
    const pageTitle = document.getElementById('page-title');
    const siteTitle = document.getElementById('site-title');
    const siteSubtitle = document.getElementById('site-subtitle');
    const heroLine1 = document.getElementById('hero-line1');
    const heroDesc = document.getElementById('hero-desc');
    const footerText = document.getElementById('footer-text');

    // ----- Fetch and parse config.yaml -----
    async function loadConfig() {
      try {
        const response = await fetch('config.yaml');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const yamlText = await response.text();
        config = jsyaml.load(yamlText);
        
        // Populate UI texts
        document.title = config.site.title;
        siteTitle.textContent = config.site.title;
        siteSubtitle.textContent = config.site.subtitle || '';
        heroLine1.innerHTML = config.site.hero.line1 + '<br>' + config.site.hero.line2;
        heroDesc.textContent = config.site.hero.description;
        footerText.innerHTML = config.site.footer;
        
        books = config.books || [];
        
        initCategories();
        render();
      } catch (error) {
        console.error('Failed to load config.yaml:', error);
        grid.innerHTML = `<div class="empty"><div class="empty-icon">📚</div><p>Could not load library. Make sure config.yaml exists.</p></div>`;
      }
    }

    // ----- Build category filters from YAML (or fallback to unique categories)-----
    function initCategories() {
      const categories = config.categories || ['All', ...new Set(books.map(b => b.category))];
      filtersEl.innerHTML = '<span class="filter-label">Filter:</span>';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          activeCategory = cat;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        });
        filtersEl.appendChild(btn);
      });
    }

    // ----- Render grid based on filters and search -----
    function render() {
      const query = searchTerm.toLowerCase().trim();
      const filtered = books.filter(book => {
        const matchCat = activeCategory === 'All' || book.category === activeCategory;
        const matchSearch = !query || 
          book.title.toLowerCase().includes(query) || 
          book.author.toLowerCase().includes(query);
        return matchCat && matchSearch;
      });

      countEl.textContent = `${filtered.length} book${filtered.length !== 1 ? 's' : ''}`;
      
      if (!filtered.length) {
        grid.innerHTML = `<div class="empty"><div class="empty-icon">📖</div><p>No books match your search.</p></div>`;
        return;
      }

      let html = '';
      filtered.forEach((book, i) => {
        const thumbHtml = book.thumbnail && book.thumbnail.trim() !== ''
          ? `<img src="${book.thumbnail}" alt="${book.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
          : '';
        const placeholderHtml = `
          <div class="placeholder" ${thumbHtml ? 'style="display:none;"' : ''}>
            <div class="placeholder-icon">📖</div>
            <div class="placeholder-title">${book.title}</div>
          </div>
        `;
        
        html += `
          <div class="card" style="animation-delay: ${i * 0.05}s">
            <div class="card-thumb">
              ${thumbHtml}
              ${placeholderHtml}
              <span class="category-tag">${book.category}</span>
            </div>
            <div class="card-body">
              <div class="card-title">${book.title}</div>
              <div class="card-author">${book.author}</div>
              <div class="card-desc">${book.description}</div>
              <div class="card-actions">
                <a class="btn btn-download" href="${book.file}" download>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Download
                </a>
                <button class="btn btn-preview" data-book='${JSON.stringify(book).replace(/'/g, "&apos;")}'>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  Preview
                </button>
              </div>
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html;

      // Attach preview listeners
      document.querySelectorAll('.btn-preview').forEach(btn => {
        btn.addEventListener('click', () => {
          const book = JSON.parse(btn.dataset.book);
          openModal(book);
        });
      });
    }

    // ----- Modal logic -----
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalAuthor = document.getElementById('modal-author');
    const modalFrame = document.getElementById('modal-frame');
    const modalDownload = document.getElementById('modal-download');

    function openModal(book) {
      modalTitle.textContent = book.title;
      modalAuthor.textContent = 'by ' + book.author;
      modalFrame.src = book.file;
      modalDownload.href = book.file;
      modalDownload.download = book.title.replace(/\s+/g, '_') + '.pdf';
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      modalFrame.src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ----- Search handling (debounced) -----
    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchTerm = searchInput.value;
        render();
      }, 200);
    });

    // ----- Start -----
    loadConfig();
  })();
</script>
</body>
</html>
